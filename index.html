<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>FinCash | Financial Literacy for First-Time Learners</title>
    <meta name="title" content="FinCash | Financial Literacy for First-Time Learners" />
    <meta name="description" content="Simulate real-life financial scenarios, get personalized learning paths on budgeting, taxes, and investments tailored for young professionals." />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">

    <!-- Theme Color -->
    <meta name="theme-color" content="#0a0a0f" />
    
    <style>
      /* Global UI Improvisation: Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0a0a0f;
      }
      ::-webkit-scrollbar-thumb {
        background: #1f1f2e;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #33334d;
      }

      /* Global Selection Style */
      ::selection {
        background-color: rgba(99, 102, 241, 0.3);
        color: #fff;
      }

      /* Base body styles to prevent layout shift */
      body {
        margin: 0;
        background-color: #0a0a0f;
        color: #ffffff;
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
